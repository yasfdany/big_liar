name: big_brother
description: A simple Flame game.
version: 0.1.0

publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  collection: ^1.19.1
  flame: ^1.36.0
  flame_behaviors: ^1.3.4
  flame_tiled: ^3.1.0
  flame_tiled_utils: ^1.3.1
  flutter:
    sdk: flutter

dev_dependencies:
  flame_lint: 1.4.2
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: false
  assets:
    - assets/images/
    - assets/images/bg/
    - assets/images/items/
    - assets/images/tiles/
    - assets/images/hero/
